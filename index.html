<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นับคะแนน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --border: #2e2e42;
    --accent: #f5c842;
    --text: #f0f0f8;
    --muted: #6b6b8a;
    --danger: #ff4f6a;
    --green: #3fffb0;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), #ff9f42);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .header-actions { display: flex; gap: 10px; }

  .btn {
    border: none; cursor: pointer; font-family: 'Sarabun', sans-serif;
    font-size: 0.85rem; font-weight: 600; border-radius: 10px;
    padding: 9px 18px; transition: all 0.18s ease;
  }

  .btn-ghost {
    background: var(--surface); color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-primary {
    background: var(--accent); color: #111;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(245,200,66,0.35); }

  /* grid of counters */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
    transition: border-color 0.2s;
    animation: cardIn 0.3s ease backwards;
  }
  .card:hover { border-color: #44445a; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .card-header {
    display: flex; align-items: center; gap: 8px;
  }

  .color-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }

  .card-title {
    flex: 1;
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Sarabun', sans-serif;
    font-size: 0.95rem; font-weight: 600;
    cursor: text;
  }
  .card-title::placeholder { color: var(--muted); }

  .delete-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1rem; padding: 2px 4px;
    border-radius: 6px; transition: all 0.15s;
  }
  .delete-btn:hover { color: var(--danger); background: rgba(255,79,106,0.1); }

  .score-display {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    letter-spacing: 2px;
    line-height: 1;
    transition: transform 0.12s ease;
  }
  .score-display.bump { transform: scale(1.15); }

  .controls {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center;
  }

  .ctrl-btn {
    border: none; cursor: pointer; border-radius: 10px;
    font-size: 1.4rem; font-weight: 700; height: 46px;
    transition: all 0.15s ease;
    display: flex; align-items: center; justify-content: center;
  }

  .minus-btn { background: rgba(255,79,106,0.15); color: var(--danger); }
  .minus-btn:hover { background: rgba(255,79,106,0.3); transform: scale(1.05); }

  .plus-btn { background: rgba(63,255,176,0.15); color: var(--green); }
  .plus-btn:hover { background: rgba(63,255,176,0.3); transform: scale(1.05); }

  .step-input {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted);
    font-size: 0.75rem; text-align: center; width: 100%; height: 34px;
    font-family: 'Sarabun', sans-serif; outline: none;
    padding: 0 4px;
  }
  .step-input:focus { border-color: var(--accent); color: var(--text); }

  .step-label { font-size: 0.65rem; color: var(--muted); text-align: center; }

  .reset-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px; cursor: pointer;
    font-size: 0.75rem; font-family: 'Sarabun', sans-serif;
    padding: 5px; width: 100%;
    transition: all 0.15s;
  }
  .reset-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* add card button */
  .add-card {
    background: transparent;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    min-height: 180px;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    color: var(--muted); font-size: 0.9rem;
    font-family: 'Sarabun', sans-serif;
    transition: all 0.2s;
  }
  .add-card:hover { border-color: var(--accent); color: var(--accent); background: rgba(245,200,66,0.04); }
  .add-card span { font-size: 2rem; line-height: 1; }

  /* reset all */
  .footer-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,15,19,0.9); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
  }

  .total-display {
    font-size: 0.85rem; color: var(--muted);
  }
  .total-display strong { color: var(--accent); font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1px; }

  .btn-danger { background: rgba(255,79,106,0.15); color: var(--danger); border: 1px solid rgba(255,79,106,0.3); }
  .btn-danger:hover { background: rgba(255,79,106,0.3); }

  /* color palette */
  .palette { display: flex; gap: 6px; }
  .pal { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
  .pal:hover, .pal.active { border-color: white; transform: scale(1.2); }

</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo">SCORE COUNTER</div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="resetAll()">รีเซ็ตทั้งหมด</button>
      <button class="btn btn-primary" onclick="addCounter()">+ เพิ่มช่อง</button>
    </div>
  </header>

  <div id="grid"></div>
</div>

<div class="footer-bar">
  <div class="total-display">คะแนนรวม: <strong id="totalScore">0</strong></div>
  <div style="font-size:0.75rem; color:var(--muted)">กดชื่อเพื่อแก้ไข • กดขั้นตอนเพื่อเปลี่ยนค่า</div>
</div>

<script>
  const COLORS = ['#f5c842','#3fffb0','#ff6b6b','#6b9fff','#ff9f42','#d06bff','#6bfff5','#ff6bd6'];
  let counters = [];
  let colorIdx = 0;

  function uid() { return Math.random().toString(36).slice(2,8); }

  function addCounter(name='', value=0, step=1, color=null) {
    const c = { id: uid(), name, value, step, color: color || COLORS[colorIdx % COLORS.length] };
    colorIdx++;
    counters.push(c);
    render();
    updateTotal();
  }

  function removeCounter(id) {
    counters = counters.filter(c => c.id !== id);
    render();
    updateTotal();
  }

  function changeValue(id, delta) {
    const c = counters.find(c => c.id === id);
    if (!c) return;
    c.value += delta;
    const el = document.getElementById('score-' + id);
    if (el) {
      el.textContent = c.value;
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 150);
    }
    updateTotal();
  }

  function resetCounter(id) {
    const c = counters.find(c => c.id === id);
    if (!c) return;
    c.value = 0;
    const el = document.getElementById('score-' + id);
    if (el) el.textContent = 0;
    updateTotal();
  }

  function resetAll() {
    counters.forEach(c => {
      c.value = 0;
      const el = document.getElementById('score-' + c.id);
      if (el) el.textContent = 0;
    });
    updateTotal();
  }

  function updateTotal() {
    const total = counters.reduce((s, c) => s + c.value, 0);
    document.getElementById('totalScore').textContent = total;
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    counters.forEach((c, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.04) + 's';
      card.innerHTML = `
        <div class="card-header">
          <div class="color-dot" style="background:${c.color}"></div>
          <input class="card-title" type="text" value="${c.name}" placeholder="ชื่อช่อง..." oninput="updateName('${c.id}',this.value)">
          <button class="delete-btn" onclick="removeCounter('${c.id}')" title="ลบ">✕</button>
        </div>
        <div class="score-display" id="score-${c.id}" style="color:${c.color}">${c.value}</div>
        <div class="controls">
          <button class="ctrl-btn minus-btn" onclick="changeValue('${c.id}', -getStep('${c.id}'))">−</button>
          <div>
            <input class="step-input" id="step-${c.id}" type="number" value="${c.step}" min="1" oninput="updateStep('${c.id}',this.value)">
            <div class="step-label">ขั้นตอน</div>
          </div>
          <button class="ctrl-btn plus-btn" onclick="changeValue('${c.id}', +getStep('${c.id}'))">+</button>
        </div>
        <button class="reset-btn" onclick="resetCounter('${c.id}')">↺ รีเซ็ต</button>
        <div class="palette">${COLORS.map(col => `<div class="pal ${col===c.color?'active':''}" style="background:${col}" onclick="setColor('${c.id}','${col}')"></div>`).join('')}</div>
      `;
      grid.appendChild(card);
    });

    // add card button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-card';
    addBtn.innerHTML = `<span>+</span>เพิ่มช่องใหม่`;
    addBtn.onclick = () => addCounter();
    grid.appendChild(addBtn);
  }

  function getStep(id) {
    const el = document.getElementById('step-' + id);
    return el ? Math.max(1, parseInt(el.value) || 1) : 1;
  }

  function updateName(id, val) {
    const c = counters.find(c => c.id === id);
    if (c) c.name = val;
  }

  function updateStep(id, val) {
    const c = counters.find(c => c.id === id);
    if (c) c.step = Math.max(1, parseInt(val) || 1);
  }

  function setColor(id, color) {
    const c = counters.find(c => c.id === id);
    if (!c) return;
    c.color = color;
    render();
  }

  // init with 3 counters
  addCounter('ผู้เล่น 1', 0, 1, COLORS[0]);
  addCounter('ผู้เล่น 2', 0, 1, COLORS[1]);
  addCounter('ผู้เล่น 3', 0, 1, COLORS[2]);
</script>
</body>
</html>
