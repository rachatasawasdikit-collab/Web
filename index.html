<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นับปริมาณจราจร</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #f0a500;
    --accent2: #e85d04;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .header-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .meta-field {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'IBM Plex Mono', monospace;
  }

  .meta-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 4px 8px;
    width: 120px;
    outline: none;
    transition: border-color 0.2s;
  }

  .meta-input:focus { border-color: var(--accent); }

  .total-bar {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .total-label {
    font-size: 13px;
    font-weight: 600;
    color: #000;
    letter-spacing: 0.05em;
  }

  .total-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: #000;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    padding: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s, transform 0.1s;
    position: relative;
  }

  .card:hover { border-color: var(--accent); }
  .card.active { border-color: var(--accent); }
  .card.active .card-count { color: var(--accent); }

  .card-header {
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-icon { font-size: 22px; flex-shrink: 0; }

  .card-name {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
  }

  .card-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    gap: 8px;
  }

  .btn-count {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-minus {
    background: rgba(248, 81, 73, 0.15);
    color: var(--red);
    border: 1px solid rgba(248, 81, 73, 0.3);
  }

  .btn-minus:active { background: rgba(248, 81, 73, 0.35); transform: scale(0.93); }

  .btn-plus {
    background: rgba(63, 185, 80, 0.15);
    color: var(--green);
    border: 1px solid rgba(63, 185, 80, 0.3);
  }

  .btn-plus:active { background: rgba(63, 185, 80, 0.35); transform: scale(0.93); }

  .card-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--muted);
    min-width: 60px;
    text-align: center;
    transition: color 0.2s;
  }

  .history-track {
    padding: 6px 14px 10px;
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    min-height: 24px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
    animation: popIn 0.15s ease;
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 0.7; }
  }

  .actions {
    padding: 0 16px 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-action {
    flex: 1;
    min-width: 120px;
    padding: 11px 18px;
    border: none;
    border-radius: 8px;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-reset {
    background: rgba(248, 81, 73, 0.12);
    color: var(--red);
    border: 1px solid rgba(248, 81, 73, 0.3);
  }

  .btn-reset:hover { background: rgba(248, 81, 73, 0.25); }

  .btn-export {
    background: rgba(240, 165, 0, 0.12);
    color: var(--accent);
    border: 1px solid rgba(240, 165, 0, 0.3);
  }

  .btn-export:hover { background: rgba(240, 165, 0, 0.25); }

  .btn-copy {
    background: rgba(88, 166, 255, 0.12);
    color: var(--blue);
    border: 1px solid rgba(88, 166, 255, 0.3);
  }

  .btn-copy:hover { background: rgba(88, 166, 255, 0.25); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 22px;
    border-radius: 30px;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* saved indicator in header */
  .save-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-dot.on { opacity: 1; }

  .section-label {
    padding: 12px 16px 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  @media (max-width: 500px) {
    .header-meta { display: none; }
    .grid { grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
    .card-name { font-size: 11px; }
    .card-count { font-size: 28px; }
    .btn-count { width: 34px; height: 34px; font-size: 17px; }
    .history-track { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">🚦 นับปริมาณจราจร</div>
  <div class="header-meta">
    <div class="meta-field">
      <span class="meta-label">SITE</span>
      <input class="meta-input" id="site" type="text" placeholder="ชื่อสถานที่">
    </div>
    <div class="meta-field">
      <span class="meta-label">DATE</span>
      <input class="meta-input" id="date" type="date">
    </div>
    <div class="meta-field">
      <span class="meta-label">NAME</span>
      <input class="meta-input" id="name" type="text" placeholder="ชื่อผู้นับ">
    </div>
  </div>
  <div class="save-dot" id="saveDot" title="บันทึกแล้ว"></div>
</header>

<div class="total-bar">
  <span class="total-label">รวมทั้งหมด</span>
  <span class="total-count" id="grandTotal">0</span>
</div>

<div class="section-label">รถส่วนบุคคล &amp; รถจักรยานยนต์</div>
<div class="grid" id="grid1"></div>

<div class="section-label">รถโดยสาร</div>
<div class="grid" id="grid2"></div>

<div class="section-label">รถบรรทุก</div>
<div class="grid" id="grid3"></div>

<div class="actions">
  <button class="btn-action btn-reset" onclick="resetAll()">🔄 รีเซ็ตทั้งหมด</button>
  <button class="btn-action btn-copy" onclick="copyData()">📋 คัดลอกข้อมูล</button>
  <button class="btn-action btn-export" onclick="exportCSV()">📥 ดาวน์โหลด CSV</button>
</div>

<div class="toast" id="toast"></div>

<script>
const VEHICLES = [
  { id: 'moto',  name: 'จักรยานยนต์\n/สามล้อเครื่อง', icon: '🏍️', grid: 1 },
  { id: 'car7',  name: 'รถนั่งส่วนบุคคล(บน)\n<7 คน',        icon: '🚗', grid: 1 },
  { id: 'car7p', name: 'รถนั่งส่วนบุคค(มากดว่า7\n>7 คน',        icon: '🚐', grid: 1 },
  { id: 'busS',  name: 'รถโดยสาร\nขนาดเล็ก',            icon: '🚌', grid: 2 },
  { id: 'busM',  name: 'รถโดยสาร\nขนาดกลาง',            icon: '🚌', grid: 2 },
  { id: 'busL',  name: 'รถโดยสาร\nขนาดใหญ่',            icon: '🚍', grid: 2 },
  { id: 'trk4',  name: 'รถกระบะ\n4 ล้อ',           icon: '🚚', grid: 3 },
  { id: 'trk6',  name: 'รถบรรทุกกลาง\n6 ล้อ',           icon: '🚛', grid: 3 },
  { id: 'trk10', name: 'รถบรรทุกใหญ่\n10 ล้อ',          icon: '🚛', grid: 3 },
  { id: 'semi',  name: 'รถกึ่งพ่วง',                     icon: '🚜', grid: 3 },
  { id: 'trail', name: 'รถพ่วง',                          icon: '🚛', grid: 3 },
  { id: 'trk4s', name: 'รถบรรทุก\n4 ล้อ*',              icon: '🚚', grid: 3 },
];

const LS_COUNTS = 'traffic_counts';
const LS_META   = 'traffic_meta';

// ── Load saved counts ──────────────────────────────────────────────────────
const saved = JSON.parse(localStorage.getItem(LS_COUNTS) || '{}');
const counts = {};
VEHICLES.forEach(v => counts[v.id] = saved[v.id] ?? 0);

// ── Build cards ────────────────────────────────────────────────────────────
function buildCard(v) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + v.id;
  card.innerHTML = `
    <div class="card-header">
      <span class="card-icon">${v.icon}</span>
      <div class="card-name">${v.name.replace(/\n/g, '<br>')}</div>
    </div>
    <div class="card-body">
      <button class="btn-count btn-minus" onclick="adjust('${v.id}',-1)">−</button>
      <div class="card-count" id="count-${v.id}">0</div>
      <button class="btn-count btn-plus" onclick="adjust('${v.id}',1)">+</button>
    </div>
    <div class="history-track" id="hist-${v.id}"></div>
  `;
  return card;
}

[1, 2, 3].forEach(g => {
  const container = document.getElementById('grid' + g);
  VEHICLES.filter(v => v.grid === g).forEach(v => container.appendChild(buildCard(v)));
});

// ── Restore UI from saved counts ───────────────────────────────────────────
VEHICLES.forEach(v => {
  if (counts[v.id] > 0) renderCard(v.id);
});
updateTotal();

// ── Restore meta fields ────────────────────────────────────────────────────
const savedMeta = JSON.parse(localStorage.getItem(LS_META) || '{}');
document.getElementById('site').value = savedMeta.site ?? '';
document.getElementById('date').value = savedMeta.date ?? new Date().toISOString().split('T')[0];
document.getElementById('name').value = savedMeta.name ?? '';

// Save meta on change
['site', 'date', 'name'].forEach(id => {
  document.getElementById(id).addEventListener('input', saveMeta);
});

// ── Save helpers ───────────────────────────────────────────────────────────
let saveDotTimer;
function flashSaveDot() {
  const dot = document.getElementById('saveDot');
  dot.classList.add('on');
  clearTimeout(saveDotTimer);
  saveDotTimer = setTimeout(() => dot.classList.remove('on'), 1200);
}

function saveCounts() {
  localStorage.setItem(LS_COUNTS, JSON.stringify(counts));
  flashSaveDot();
}

function saveMeta() {
  localStorage.setItem(LS_META, JSON.stringify({
    site: document.getElementById('site').value,
    date: document.getElementById('date').value,
    name: document.getElementById('name').value,
  }));
  flashSaveDot();
}

// ── Core logic ─────────────────────────────────────────────────────────────
function renderCard(id) {
  document.getElementById('count-' + id).textContent = counts[id];
  const card = document.getElementById('card-' + id);
  card.classList.toggle('active', counts[id] > 0);

  const hist = document.getElementById('hist-' + id);
  hist.innerHTML = '';
  const show = Math.min(counts[id], 20);
  for (let i = 0; i < show; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    hist.appendChild(dot);
  }
  if (counts[id] > 20) {
    hist.innerHTML += `<span style="font-size:10px;color:var(--muted);margin-left:4px;font-family:monospace">+${counts[id]-20}</span>`;
  }
}

function adjust(id, delta) {
  counts[id] = Math.max(0, counts[id] + delta);
  renderCard(id);
  updateTotal();
  saveCounts();
}

function updateTotal() {
  document.getElementById('grandTotal').textContent =
    Object.values(counts).reduce((a, b) => a + b, 0);
}

function resetAll() {
  if (!confirm('รีเซ็ตตัวนับทั้งหมดใช่ไหม?')) return;
  VEHICLES.forEach(v => {
    counts[v.id] = 0;
    renderCard(v.id);
    document.getElementById('hist-' + v.id).innerHTML = '';
  });
  updateTotal();
  saveCounts();
}

// ── Export helpers ─────────────────────────────────────────────────────────
function getData() {
  return {
    site: document.getElementById('site').value || '-',
    date: document.getElementById('date').value || '-',
    name: document.getElementById('name').value || '-',
  };
}

function copyData() {
  const { site, date, name } = getData();
  let text = `SITE: ${site}  DATE: ${date}  NAME: ${name}\n`;
  text += '─'.repeat(50) + '\n';
  VEHICLES.forEach(v => {
    const label = v.name.replace(/\n/g, '').padEnd(22, ' ');
    text += `${label}: ${counts[v.id]}\n`;
  });
  text += '─'.repeat(50) + '\n';
  text += `รวม: ${Object.values(counts).reduce((a, b) => a + b, 0)}`;
  navigator.clipboard.writeText(text).then(() => showToast('✅ คัดลอกแล้ว!'));
}

function exportCSV() {
  const { site, date, name } = getData();
  let csv = `SITE,DATE,NAME\n"${site}","${date}","${name}"\n\n`;
  csv += 'ประเภทรถ,จำนวน\n';
  VEHICLES.forEach(v => {
    csv += `"${v.name.replace(/\n/g, '')}",${counts[v.id]}\n`;
  });
  csv += `"รวมทั้งหมด",${Object.values(counts).reduce((a, b) => a + b, 0)}`;
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `traffic_count_${date}.csv`;
  a.click();
  showToast('📥 ดาวน์โหลดแล้ว!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
