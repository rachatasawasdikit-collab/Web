<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>นับปริมาณจราจร</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #f0a500;
    --accent2: #e85d04;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .header-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .meta-field {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'IBM Plex Mono', monospace;
  }

  .meta-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 4px 8px;
    width: 120px;
    outline: none;
    transition: border-color 0.2s;
  }

  .meta-input:focus { border-color: var(--accent); }

  .total-bar {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .total-label {
    font-size: 13px;
    font-weight: 600;
    color: #000;
    letter-spacing: 0.05em;
  }

  .total-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: #000;
  }

  /* ─── Edit Mode Banner ─── */
  .edit-banner {
    background: rgba(188, 140, 255, 0.08);
    border-bottom: 1px solid rgba(188, 140, 255, 0.3);
    padding: 8px 20px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--purple);
    font-family: 'IBM Plex Mono', monospace;
  }

  .edit-banner.visible { display: flex; }

  .edit-banner-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--purple);
    animation: blink 1s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ─── Grid ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    padding: 16px;
  }

  /* ─── Card ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s, transform 0.1s;
    position: relative;
  }

  .card:hover { border-color: var(--accent); }
  .card.active { border-color: var(--accent); }
  .card.active .card-count { color: var(--accent); }

  /* Edit mode card style */
  body.edit-mode .card { border-color: rgba(188, 140, 255, 0.4); }
  body.edit-mode .card:hover { border-color: var(--purple); }

  .card-header {
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }

  /* ─── Icon button ─── */
  .card-icon {
    font-size: 22px;
    flex-shrink: 0;
    cursor: default;
  }

  body.edit-mode .card-icon {
    cursor: pointer;
    border: 1px dashed rgba(188, 140, 255, 0.5);
    border-radius: 6px;
    padding: 2px 4px;
    position: relative;
  }

  body.edit-mode .card-icon:hover::after {
    content: '✏️';
    position: absolute;
    top: -6px; right: -6px;
    font-size: 11px;
    background: var(--surface2);
    border-radius: 50%;
    width: 16px; height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── Name display / input ─── */
  .card-name {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    flex: 1;
  }

  .card-name-input {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    background: var(--bg);
    border: 1px solid rgba(188, 140, 255, 0.5);
    border-radius: 5px;
    padding: 4px 8px;
    width: 100%;
    outline: none;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    resize: none;
    transition: border-color 0.2s;
    display: none;
  }

  .card-name-input:focus { border-color: var(--purple); }

  body.edit-mode .card-name { display: none; }
  body.edit-mode .card-name-input { display: block; }

  /* ─── Card body ─── */
  .card-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    gap: 8px;
  }

  body.edit-mode .card-body { opacity: 0.35; pointer-events: none; }

  .btn-count {
    width: 40px; height: 40px;
    border: none; border-radius: 8px;
    cursor: pointer;
    font-size: 20px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn-minus {
    background: rgba(248, 81, 73, 0.15);
    color: var(--red);
    border: 1px solid rgba(248, 81, 73, 0.3);
  }
  .btn-minus:active { background: rgba(248, 81, 73, 0.35); transform: scale(0.93); }

  .btn-plus {
    background: rgba(63, 185, 80, 0.15);
    color: var(--green);
    border: 1px solid rgba(63, 185, 80, 0.3);
  }
  .btn-plus:active { background: rgba(63, 185, 80, 0.35); transform: scale(0.93); }

  .card-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--muted);
    min-width: 60px;
    text-align: center;
    transition: color 0.2s;
  }

  .history-track {
    padding: 6px 14px 10px;
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    min-height: 24px;
  }

  body.edit-mode .history-track { display: none; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
    animation: popIn 0.15s ease;
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 0.7; }
  }

  /* ─── Section Label + Add Button ─── */
  .section-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 4px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .btn-add-vehicle {
    display: none;
    align-items: center;
    gap: 5px;
    background: rgba(188, 140, 255, 0.1);
    color: var(--purple);
    border: 1px dashed rgba(188, 140, 255, 0.4);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-add-vehicle:hover { background: rgba(188, 140, 255, 0.2); }

  body.edit-mode .btn-add-vehicle { display: flex; }

  /* Delete button on card */
  .btn-delete-card {
    display: none;
    position: absolute;
    top: 6px; right: 8px;
    background: rgba(248, 81, 73, 0.15);
    color: var(--red);
    border: 1px solid rgba(248, 81, 73, 0.3);
    border-radius: 5px;
    width: 22px; height: 22px;
    font-size: 13px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-delete-card:hover { background: rgba(248, 81, 73, 0.35); }

  body.edit-mode .btn-delete-card { display: flex; }

  /* Section name editable */
  .section-name-display { cursor: default; }
  body.edit-mode .section-name-display { cursor: pointer; text-decoration: underline dotted rgba(188,140,255,0.5); }

  /* ─── Actions ─── */
  .actions {
    padding: 0 16px 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-action {
    flex: 1;
    min-width: 100px;
    padding: 11px 14px;
    border: none; border-radius: 8px;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-reset {
    background: rgba(248, 81, 73, 0.12);
    color: var(--red);
    border: 1px solid rgba(248, 81, 73, 0.3);
  }
  .btn-reset:hover { background: rgba(248, 81, 73, 0.25); }

  .btn-export {
    background: rgba(240, 165, 0, 0.12);
    color: var(--accent);
    border: 1px solid rgba(240, 165, 0, 0.3);
  }
  .btn-export:hover { background: rgba(240, 165, 0, 0.25); }

  .btn-copy {
    background: rgba(88, 166, 255, 0.12);
    color: var(--blue);
    border: 1px solid rgba(88, 166, 255, 0.3);
  }
  .btn-copy:hover { background: rgba(88, 166, 255, 0.25); }

  .btn-edit {
    background: rgba(188, 140, 255, 0.12);
    color: var(--purple);
    border: 1px solid rgba(188, 140, 255, 0.3);
  }
  .btn-edit:hover { background: rgba(188, 140, 255, 0.25); }

  .btn-edit.active {
    background: rgba(188, 140, 255, 0.28);
    border-color: var(--purple);
  }

  /* ─── Emoji Picker Popup ─── */
  .emoji-picker {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--purple);
    border-radius: 12px;
    padding: 12px;
    z-index: 500;
    display: none;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-width: 260px;
  }

  .emoji-picker.visible { display: flex; }

  .emoji-picker-title {
    font-size: 10px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .emoji-picker-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 18px;
    padding: 6px 10px;
    width: 100%;
    outline: none;
    font-family: serif;
    text-align: center;
    transition: border-color 0.2s;
  }

  .emoji-picker-input:focus { border-color: var(--purple); }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .emoji-opt {
    font-size: 20px;
    text-align: center;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }

  .emoji-opt:hover { background: var(--surface2); }

  .emoji-picker-actions {
    display: flex;
    gap: 6px;
  }

  .emoji-btn {
    flex: 1;
    padding: 7px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    transition: background 0.15s;
  }

  .emoji-btn-ok {
    background: rgba(188, 140, 255, 0.2);
    color: var(--purple);
    border: 1px solid rgba(188, 140, 255, 0.4);
  }
  .emoji-btn-ok:hover { background: rgba(188, 140, 255, 0.35); }

  .emoji-btn-cancel {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .emoji-btn-cancel:hover { background: var(--border); }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 22px;
    border-radius: 30px;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .save-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-dot.on { opacity: 1; }

  /* ─── Responsive ─── */
  @media (max-width: 500px) {
    .header-meta { display: none; }
    .grid { grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
    .card-name { font-size: 11px; }
    .card-count { font-size: 28px; }
    .btn-count { width: 34px; height: 34px; font-size: 17px; }
    .history-track { display: none; }
    .btn-action { font-size: 11px; padding: 10px 8px; min-width: 72px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">🚦 นับปริมาณจราจร</div>
  <div class="header-meta">
    <div class="meta-field">
      <span class="meta-label">SITE</span>
      <input class="meta-input" id="site" type="text" placeholder="ชื่อสถานที่">
    </div>
    <div class="meta-field">
      <span class="meta-label">DATE</span>
      <input class="meta-input" id="date" type="date">
    </div>
    <div class="meta-field">
      <span class="meta-label">NAME</span>
      <input class="meta-input" id="name" type="text" placeholder="ชื่อผู้นับ">
    </div>
  </div>
  <div class="save-dot" id="saveDot" title="บันทึกแล้ว"></div>
</header>

<div class="total-bar">
  <span class="total-label">รวมทั้งหมด</span>
  <span class="total-count" id="grandTotal">0</span>
</div>

<div class="edit-banner" id="editBanner">
  <div class="edit-banner-dot"></div>
  <span>โหมดแก้ไข — แตะชื่อรถหรือ emoji เพื่อแก้ไข · กด + เพื่อเพิ่มรายการ</span>
</div>

<!-- Grids will be injected by JS -->
<div id="sections"></div>

<div class="actions">
  <button class="btn-action btn-edit"   id="btnEdit">✏️ แก้ไขรายการ</button>
  <button class="btn-action btn-reset"  id="btnReset">🔄 รีเซ็ตทั้งหมด</button>
  <button class="btn-action btn-copy"   id="btnCopy">📋 คัดลอก</button>
  <button class="btn-action btn-export" id="btnExport">📥 CSV</button>
</div>

<div class="toast" id="toast"></div>

<!-- Emoji Picker -->
<div class="emoji-picker" id="emojiPicker">
  <div class="emoji-picker-title">เลือก Emoji / พิมพ์เอง</div>
  <input class="emoji-picker-input" id="emojiInput" maxlength="2" placeholder="🚗">
  <div class="emoji-grid" id="emojiGrid"></div>
  <div class="emoji-picker-actions">
    <button class="emoji-btn emoji-btn-ok" id="emojiOk">ตกลง</button>
    <button class="emoji-btn emoji-btn-cancel" id="emojiCancel">ยกเลิก</button>
  </div>
</div>

<script>
/* ──────────────────────────────────────────────
   DEFAULT DATA
────────────────────────────────────────────── */
const DEFAULT_SECTIONS = [
  {
    id: 's1',
    name: 'รถส่วนบุคคล & รถจักรยานยนต์',
    vehicles: [
      { id: 'moto',  name: 'จักรยานยนต์/สามล้อเครื่อง', icon: '🏍️' },
      { id: 'car7',  name: 'รถนั่งส่วนบุคคล ≤7 คน',     icon: '🚗' },
      { id: 'car7p', name: 'รถนั่งส่วนบุคคล >7 คน',     icon: '🚐' },
    ]
  },
  {
    id: 's2',
    name: 'รถโดยสาร',
    vehicles: [
      { id: 'busS', name: 'รถโดยสารขนาดเล็ก (แท็กซี่)', icon: '🚌' },
      { id: 'busM', name: 'รถโดยสารขนาดกลาง',           icon: '🚌' },
      { id: 'busL', name: 'รถโดยสารขนาดใหญ่',           icon: '🚍' },
    ]
  },
  {
    id: 's3',
    name: 'รถบรรทุก',
    vehicles: [
      { id: 'trk4',  name: 'รถกระบะ 4 ล้อ',    icon: '🚚' },
      { id: 'trk6',  name: 'รถบรรทุกกลาง 6 ล้อ', icon: '🚛' },
      { id: 'trk10', name: 'รถบรรทุกใหญ่ 10 ล้อ', icon: '🚛' },
      { id: 'semi',  name: 'รถกึ่งพ่วง',         icon: '🚜' },
      { id: 'trail', name: 'รถพ่วง',              icon: '🚛' },
      { id: 'trk4s', name: 'รถบรรทุก 4 ล้อ*',    icon: '🚚' },
    ]
  }
];

const EMOJI_PRESETS = [
  '🚗','🚕','🚙','🚌','🚍','🚎','🚐','🚑','🚒','🚓',
  '🏍️','🛵','🚲','🛴','🚛','🚚','🚜','🏎️','🚐','🚂',
  '✈️','🚢','⛴️','🚤','🛻','🚐','🚑','🚒','🚘','🚖',
];

/* ──────────────────────────────────────────────
   STATE
────────────────────────────────────────────── */
const LS_SECTIONS = 'traffic_sections_v2';
const LS_COUNTS   = 'traffic_counts_v2';
const LS_META     = 'traffic_meta';

let sections = loadSections();
let counts   = loadCounts();
let editMode = false;

let uidCounter = Date.now();
function uid() { return 'v' + (uidCounter++); }

function loadSections() {
  try {
    const raw = localStorage.getItem(LS_SECTIONS);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
}

function loadCounts() {
  try {
    const raw = localStorage.getItem(LS_COUNTS);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // seed from old key if exists
  const old = JSON.parse(localStorage.getItem('traffic_counts') || '{}');
  return old;
}

function saveSections() {
  // sync names from inputs if in edit mode
  if (editMode) pullNamesFromInputs();
  localStorage.setItem(LS_SECTIONS, JSON.stringify(sections));
  localStorage.setItem(LS_COUNTS, JSON.stringify(counts));
  flashSaveDot();
}

function pullNamesFromInputs() {
  sections.forEach(sec => {
    const secInput = document.getElementById('sec-input-' + sec.id);
    if (secInput) sec.name = secInput.value || sec.name;
    sec.vehicles.forEach(v => {
      const inp = document.getElementById('name-input-' + v.id);
      if (inp) v.name = inp.value || v.name;
    });
  });
}

/* ──────────────────────────────────────────────
   RENDER
────────────────────────────────────────────── */
function renderAll() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  sections.forEach(sec => {
    // section row
    const row = document.createElement('div');
    row.className = 'section-row';
    row.innerHTML = `
      <span class="section-label">
        <span class="section-name-display" id="sec-display-${sec.id}" title="คลิกเพื่อแก้ชื่อหมวด">${sec.name}</span>
        <input id="sec-input-${sec.id}" type="text" value="${escHtml(sec.name)}"
          style="display:none;background:var(--bg);border:1px solid rgba(188,140,255,0.5);border-radius:4px;
                 color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;
                 padding:2px 6px;outline:none;width:200px;"
          oninput="syncSectionName('${sec.id}',this.value)">
      </span>
      <button class="btn-add-vehicle" onclick="addVehicle('${sec.id}')">＋ เพิ่มรายการ</button>
    `;
    container.appendChild(row);

    // toggle section name edit on click
    row.querySelector('.section-name-display').addEventListener('click', () => {
      if (!editMode) return;
      const disp = document.getElementById('sec-display-' + sec.id);
      const inp  = document.getElementById('sec-input-' + sec.id);
      disp.style.display = 'none';
      inp.style.display  = 'inline-block';
      inp.focus(); inp.select();
    });

    row.querySelector('#sec-input-' + sec.id).addEventListener('blur', () => {
      const disp = document.getElementById('sec-display-' + sec.id);
      const inp  = document.getElementById('sec-input-' + sec.id);
      const val  = inp.value.trim() || sec.name;
      sec.name = val;
      disp.textContent = val;
      disp.style.display = '';
      inp.style.display  = 'none';
      saveSections();
    });

    // grid
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.id = 'grid-' + sec.id;
    sec.vehicles.forEach(v => grid.appendChild(buildCard(v)));
    container.appendChild(grid);
  });

  updateTotal();
}

function syncSectionName(secId, val) {
  const sec = sections.find(s => s.id === secId);
  if (sec) sec.name = val;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildCard(v) {
  const cnt = counts[v.id] ?? 0;
  const card = document.createElement('div');
  card.className = 'card' + (cnt > 0 ? ' active' : '');
  card.id = 'card-' + v.id;

  // history dots
  let dotsHtml = '';
  const show = Math.min(cnt, 20);
  for (let i = 0; i < show; i++) dotsHtml += '<div class="dot"></div>';
  if (cnt > 20) dotsHtml += `<span style="font-size:10px;color:var(--muted);margin-left:4px;font-family:monospace">+${cnt-20}</span>`;

  card.innerHTML = `
    <button class="btn-delete-card" title="ลบรายการนี้" onclick="deleteVehicle('${v.id}')">✕</button>
    <div class="card-header">
      <span class="card-icon" id="icon-${v.id}" data-id="${v.id}">${v.icon}</span>
      <div class="card-name">${escHtml(v.name)}</div>
      <textarea class="card-name-input" id="name-input-${v.id}" rows="2"
        oninput="liveUpdateName('${v.id}',this.value)">${v.name}</textarea>
    </div>
    <div class="card-body">
      <button class="btn-count btn-minus" data-id="${v.id}" data-delta="-1">−</button>
      <div class="card-count" id="count-${v.id}">${cnt}</div>
      <button class="btn-count btn-plus"  data-id="${v.id}" data-delta="1">+</button>
    </div>
    <div class="history-track" id="hist-${v.id}">${dotsHtml}</div>
  `;

  // icon click → emoji picker
  card.querySelector('.card-icon').addEventListener('click', (e) => {
    if (!editMode) return;
    e.stopPropagation();
    openEmojiPicker(v.id, card.querySelector('.card-icon'));
  });

  return card;
}

function liveUpdateName(id, val) {
  const sec = sections.find(s => s.vehicles.some(v => v.id === id));
  if (!sec) return;
  const v = sec.vehicles.find(v => v.id === id);
  if (v) {
    v.name = val;
    const disp = document.querySelector(`#card-${id} .card-name`);
    if (disp) disp.innerHTML = escHtml(val);
  }
  saveSections();
}

/* ──────────────────────────────────────────────
   COUNT LOGIC
────────────────────────────────────────────── */
function adjust(id, delta) {
  counts[id] = Math.max(0, (counts[id] ?? 0) + delta);
  renderCard(id);
  updateTotal();
  saveSections();
}

function renderCard(id) {
  const cnt = counts[id] ?? 0;
  const countEl = document.getElementById('count-' + id);
  if (countEl) countEl.textContent = cnt;
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('active', cnt > 0);

  const hist = document.getElementById('hist-' + id);
  if (!hist) return;
  hist.innerHTML = '';
  const show = Math.min(cnt, 20);
  for (let i = 0; i < show; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    hist.appendChild(dot);
  }
  if (cnt > 20) {
    hist.innerHTML += `<span style="font-size:10px;color:var(--muted);margin-left:4px;font-family:monospace">+${cnt-20}</span>`;
  }
}

function updateTotal() {
  const allIds = sections.flatMap(s => s.vehicles.map(v => v.id));
  const total = allIds.reduce((acc, id) => acc + (counts[id] ?? 0), 0);
  document.getElementById('grandTotal').textContent = total;
}

/* ──────────────────────────────────────────────
   EDIT MODE
────────────────────────────────────────────── */
function toggleEditMode() {
  if (editMode) {
    // Save & exit
    pullNamesFromInputs();
    saveSections();
    editMode = false;
    document.body.classList.remove('edit-mode');
    document.getElementById('btnEdit').classList.remove('active');
    document.getElementById('btnEdit').textContent = '✏️ แก้ไขรายการ';
    document.getElementById('editBanner').classList.remove('visible');
    renderAll(); // re-render to apply new names
    showToast('✅ บันทึกการแก้ไขแล้ว');
  } else {
    editMode = true;
    document.body.classList.add('edit-mode');
    document.getElementById('btnEdit').classList.add('active');
    document.getElementById('btnEdit').textContent = '💾 บันทึก';
    document.getElementById('editBanner').classList.add('visible');
  }
}

/* ──────────────────────────────────────────────
   ADD / DELETE VEHICLE
────────────────────────────────────────────── */
function addVehicle(secId) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  const newV = { id: uid(), name: 'รายการใหม่', icon: '🚗' };
  counts[newV.id] = 0;
  sec.vehicles.push(newV);
  // append card to grid
  const grid = document.getElementById('grid-' + secId);
  if (grid) {
    grid.appendChild(buildCard(newV));
    // focus name input
    setTimeout(() => {
      const inp = document.getElementById('name-input-' + newV.id);
      if (inp) { inp.focus(); inp.select(); }
    }, 50);
  }
  saveSections();
}

function deleteVehicle(id) {
  if (!confirm('ลบรายการนี้ออก?')) return;
  sections.forEach(sec => {
    sec.vehicles = sec.vehicles.filter(v => v.id !== id);
  });
  delete counts[id];
  const card = document.getElementById('card-' + id);
  if (card) card.remove();
  updateTotal();
  saveSections();
}

/* ──────────────────────────────────────────────
   EMOJI PICKER
────────────────────────────────────────────── */
let emojiTargetId = null;

function openEmojiPicker(id, anchorEl) {
  emojiTargetId = id;
  const sec = sections.find(s => s.vehicles.some(v => v.id === id));
  const v = sec?.vehicles.find(v => v.id === id);

  const picker = document.getElementById('emojiPicker');
  const input  = document.getElementById('emojiInput');
  input.value  = v?.icon ?? '🚗';

  // Build preset grid
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  EMOJI_PRESETS.forEach(em => {
    const span = document.createElement('span');
    span.className = 'emoji-opt';
    span.textContent = em;
    span.addEventListener('click', () => {
      input.value = em;
    });
    grid.appendChild(span);
  });

  // Position near anchor
  const rect = anchorEl.getBoundingClientRect();
  picker.style.top  = (rect.bottom + window.scrollY + 8) + 'px';
  picker.style.left = Math.min(rect.left, window.innerWidth - 280) + 'px';

  picker.classList.add('visible');
  input.focus();
}

document.getElementById('emojiOk').addEventListener('click', () => {
  if (!emojiTargetId) return;
  const val = document.getElementById('emojiInput').value.trim();
  if (!val) return;

  const sec = sections.find(s => s.vehicles.some(v => v.id === emojiTargetId));
  const v = sec?.vehicles.find(v => v.id === emojiTargetId);
  if (v) {
    v.icon = val;
    const iconEl = document.getElementById('icon-' + emojiTargetId);
    if (iconEl) iconEl.textContent = val;
  }
  document.getElementById('emojiPicker').classList.remove('visible');
  emojiTargetId = null;
  saveSections();
});

document.getElementById('emojiCancel').addEventListener('click', () => {
  document.getElementById('emojiPicker').classList.remove('visible');
  emojiTargetId = null;
});

// Close picker on outside click
document.addEventListener('click', (e) => {
  const picker = document.getElementById('emojiPicker');
  if (!picker.contains(e.target) && !e.target.closest('.card-icon')) {
    picker.classList.remove('visible');
  }
});

/* ──────────────────────────────────────────────
   META
────────────────────────────────────────────── */
const savedMeta = JSON.parse(localStorage.getItem(LS_META) || '{}');
document.getElementById('site').value = savedMeta.site ?? '';
document.getElementById('date').value = savedMeta.date ?? new Date().toISOString().split('T')[0];
document.getElementById('name').value = savedMeta.name ?? '';

['site', 'date', 'name'].forEach(id => {
  document.getElementById(id).addEventListener('input', saveMeta);
});

function saveMeta() {
  localStorage.setItem(LS_META, JSON.stringify({
    site: document.getElementById('site').value,
    date: document.getElementById('date').value,
    name: document.getElementById('name').value,
  }));
  flashSaveDot();
}

/* ──────────────────────────────────────────────
   RESET / COPY / EXPORT
────────────────────────────────────────────── */
function resetAll() {
  if (!confirm('รีเซ็ตตัวนับทั้งหมดใช่ไหม?')) return;
  sections.forEach(sec => sec.vehicles.forEach(v => { counts[v.id] = 0; }));
  saveSections();
  renderAll();
  showToast('🔄 รีเซ็ตแล้ว');
}

function getData() {
  return {
    site: document.getElementById('site').value || '-',
    date: document.getElementById('date').value || '-',
    name: document.getElementById('name').value || '-',
  };
}

function copyData() {
  const { site, date, name } = getData();
  let text = `SITE: ${site}  DATE: ${date}  NAME: ${name}\n`;
  text += '─'.repeat(50) + '\n';
  sections.forEach(sec => {
    text += `\n[${sec.name}]\n`;
    sec.vehicles.forEach(v => {
      const label = v.name.padEnd(24, ' ');
      text += `  ${label}: ${counts[v.id] ?? 0}\n`;
    });
  });
  text += '─'.repeat(50) + '\n';
  const total = sections.flatMap(s=>s.vehicles).reduce((a,v)=>a+(counts[v.id]??0),0);
  text += `รวม: ${total}`;
  navigator.clipboard.writeText(text).then(() => showToast('✅ คัดลอกแล้ว!'));
}

function exportCSV() {
  const { site, date, name } = getData();
  let csv = `SITE,DATE,NAME\n"${site}","${date}","${name}"\n\n`;
  sections.forEach(sec => {
    csv += `\n"${sec.name}"\n`;
    csv += 'ประเภทรถ,จำนวน\n';
    sec.vehicles.forEach(v => {
      csv += `"${v.icon} ${v.name}",${counts[v.id] ?? 0}\n`;
    });
  });
  const total = sections.flatMap(s=>s.vehicles).reduce((a,v)=>a+(counts[v.id]??0),0);
  csv += `"รวมทั้งหมด",${total}`;

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `traffic_count_${date}.csv`;
  a.click();
  showToast('📥 ดาวน์โหลดแล้ว!');
}

/* ──────────────────────────────────────────────
   UTILS
────────────────────────────────────────────── */
let saveDotTimer;
function flashSaveDot() {
  const dot = document.getElementById('saveDot');
  dot.classList.add('on');
  clearTimeout(saveDotTimer);
  saveDotTimer = setTimeout(() => dot.classList.remove('on'), 1200);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ──────────────────────────────────────────────
   EVENTS
────────────────────────────────────────────── */
document.getElementById('btnEdit').addEventListener('click', toggleEditMode);
document.getElementById('btnReset').addEventListener('click', resetAll);
document.getElementById('btnCopy').addEventListener('click', copyData);
document.getElementById('btnExport').addEventListener('click', exportCSV);

/* Touch — กัน double-tap zoom */
document.addEventListener('touchend', function(e) {
  const btn = e.target.closest('.btn-count');
  if (!btn) return;
  e.preventDefault();
  adjust(btn.dataset.id, +btn.dataset.delta);
}, { passive: false });

/* Mouse click */
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.btn-count');
  if (!btn) return;
  adjust(btn.dataset.id, +btn.dataset.delta);
});

/* ──────────────────────────────────────────────
   INIT
────────────────────────────────────────────── */
renderAll();
</script>
</body>
</html>
